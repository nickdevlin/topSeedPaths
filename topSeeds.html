<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #fff;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 14px;
      fill: #555;
    }

    .grid line {
      stroke: #eee;
    }

    .region-label {
      font-size: 14px;
      font-weight: 600;
    }

    .total-label {
      font-size: 14px;
      font-weight: 700;
    }

    .note {
      font-size: 12px;
      fill: #666;
    }

    .separator {
      stroke: #eee;
      stroke-width: 1;
    }

    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="tooltip"></div>
<svg width="820" height="460"></svg>

<script>
const raw = [
  {team: "No. 3 Michigan St.", region: "East", rating: 28.31},
  {team: "No. 5 St. John's", region: "East", rating: 25.91},
  {team: "No. 8 Ohio St.", region: "East", rating: 22.24},
  {team: "No. 16 Siena", region: "East", rating: -2.1},

  {team: "No. 2 Iowa St.", region: "Midwest", rating: 32.42},
  {team: "No. 4 Alabama", region: "Midwest", rating: 25.72},
  {team: "No. 8 Georgia", region: "Midwest", rating: 20.48},
  {team: "No. 16 UMBC", region: "Midwest", rating: -1.67},

  {team: "No. 2 Houston", region: "South", rating: 33.43},
  {team: "No. 5 Vanderbilt", region: "South", rating: 27.51},
  {team: "No. 9 Iowa", region: "South", rating: 22.44},
  {team: "No. 16 Lehigh", region: "South", rating: -10.37},

  {team: "No. 2 Purdue", region: "West", rating: 31.2},
  {team: "No. 4 Arkansas", region: "West", rating: 26.05},
  {team: "No. 9 Utah St.", region: "West", rating: 20.76},
  {team: "No. 16 LIU", region: "West", rating: -3.95}
];

const regionNames = {
  "Midwest": "Michigan",
  "West": "Arizona",
  "East": "Duke",
  "South": "Florida"
};

const teamColors = {
  "Michigan": "#FFCB05",
  "Arizona": "#AB0520",
  "Florida": "#FA4616",
  "Duke": "#00539B"
};

const svg = d3.select("svg");
const tooltip = d3.select(".tooltip");

const width = +svg.attr("width");
const height = +svg.attr("height");

const margin = {top: 120, right: 140, bottom: 50, left: 140};
const valueX = width - margin.right + 5;

// Group + averages
const grouped = d3.groups(raw, d => d.region).map(([region, values]) => ({
  region,
  label: regionNames[region],
  values,
  avg: d3.mean(values, d => d.rating)
}));

grouped.sort((a,b) => d3.descending(a.avg, b.avg));

// Scales
const x = d3.scaleLinear()
  .domain(d3.extent(raw, d => d.rating))
  .nice()
  .range([margin.left, width - margin.right]);

const y = d3.scaleBand()
  .domain(grouped.map(d => d.label))
  .range([margin.top, height - margin.bottom])
  .padding(0.65);

// Title
svg.append("text")
  .attr("class", "title")
  .attr("x", margin.left)
  .attr("y", 35)
  .text("Which No. 1 seed has the toughest road to the Final Four?");

// --- WRAPPED SUBTITLE ---
const subtitleText = "If the teams in each region of the NCAA Men's Basketball Tournament with the highest KenPom ratings prevail, Michigan would have the highest average opponent rating of the four top seeds.";

function wrapText(text, width) {
  text.each(function () {
    const textSel = d3.select(this);
    const words = textSel.text().split(/\s+/).reverse();
    let word, line = [], lineNumber = 0;
    const lineHeight = 1.2;
    const y = textSel.attr("y");
    const x = textSel.attr("x");

    let tspan = textSel.text(null).append("tspan").attr("x", x).attr("y", y);

    while (word = words.pop()) {
      line.push(word);
      tspan.text(line.join(" "));
      if (tspan.node().getComputedTextLength() > width) {
        line.pop();
        tspan.text(line.join(" "));
        line = [word];
        tspan = textSel.append("tspan")
          .attr("x", x)
          .attr("y", y)
          .attr("dy", ++lineNumber * lineHeight + "em")
          .text(word);
      }
    }
  });
}

svg.append("text")
  .attr("class", "subtitle")
  .attr("x", margin.left)
  .attr("y", 60)
  .text(subtitleText)
  .call(wrapText, width - margin.left - margin.right);

// Grid
svg.append("g")
  .attr("class", "grid")
  .attr("transform", `translate(0,${height - margin.bottom})`)
  .call(d3.axisBottom(x).ticks(6).tickSize(-height + margin.top + margin.bottom).tickFormat(""))
  .call(g => g.select(".domain").remove());

// Zero line
svg.append("line")
  .attr("x1", x(0))
  .attr("x2", x(0))
  .attr("y1", margin.top)
  .attr("y2", height - margin.bottom)
  .attr("stroke", "#999")
  .attr("stroke-dasharray", "4,2");

// Axis
svg.append("g")
  .attr("transform", `translate(0,${height - margin.bottom})`)
  .call(d3.axisBottom(x).ticks(6))
  .call(g => g.select(".domain").remove());

// --- SEPARATORS ---
svg.selectAll(".separator")
  .data(grouped)
  .join("line")
  .attr("class", "separator")
  .attr("x1", margin.left)
  .attr("x2", width - margin.right)
  .attr("y1", d => y(d.label) + y.bandwidth())
  .attr("y2", d => y(d.label) + y.bandwidth());

// Labels
svg.selectAll(".region")
  .data(grouped)
  .join("text")
  .attr("class", "region-label")
  .attr("x", margin.left - 10)
  .attr("y", d => y(d.label) + y.bandwidth()/2)
  .attr("text-anchor", "end")
  .attr("alignment-baseline", "middle")
  .text(d => d.label);

// Dots
svg.selectAll("g.dots")
  .data(grouped)
  .join("g")
  .selectAll("circle")
  .data(d => d.values.map(v => ({...v, label: d.label})))
  .join("circle")
    .attr("cx", d => x(d.rating))
    .attr("cy", d => y(d.label) + y.bandwidth()/2)
    .attr("r", 5.5)
    .attr("fill", d => teamColors[d.label])
    .attr("opacity", 0.9)
    .style("cursor", "pointer")
    .on("mouseover", function(event, d) {
      d3.selectAll("circle").attr("opacity", 0.2);
      d3.select(this).attr("opacity", 1).attr("r", 7);

      tooltip
        .style("opacity", 1)
        .html(`${d.team}<br>${d.rating.toFixed(1)}`);
    })
    .on("mousemove", (event) => {
      tooltip
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY - 20) + "px");
    })
    .on("mouseout", function() {
      d3.selectAll("circle").attr("opacity", 0.9).attr("r", 5.5);
      tooltip.style("opacity", 0);
    });

// Averages
svg.selectAll(".totals")
  .data(grouped)
  .join("text")
    .attr("class", "total-label")
    .attr("x", valueX)
    .attr("y", d => y(d.label) + y.bandwidth()/2)
    .attr("alignment-baseline", "middle")
    .attr("text-anchor", "start")
    .text(d => d.avg.toFixed(1));

// Header
svg.append("text")
  .attr("x", valueX)
  .attr("y", margin.top - 10)
  .attr("font-size", 12)
  .attr("fill", "#555")
  .text("Avg Opp. Rating");

// Footer
svg.append("text")
  .attr("class", "note")
  .attr("x", margin.left)
  .attr("y", height - 10)
  .text("Source: KenPom");

</script>
</body>
</html>
