<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #fff;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 14px;
      fill: #555;
    }

    .axis text {
      font-size: 12px;
      fill: #444;
    }

    .grid line {
      stroke: #eee;
    }

    .region-label {
      font-size: 14px;
      font-weight: 600;
    }

    .total-label {
      font-size: 14px;
      font-weight: 700;
    }

    .note {
      font-size: 12px;
      fill: #666;
    }

    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="tooltip"></div>
<svg width="820" height="460"></svg>

<script>
const raw = [
  {team: "No. 3 Michigan St.", region: "East", rating: 28.31},
  {team: "No. 5 St. John's", region: "East", rating: 25.91},
  {team: "No. 8 Ohio St.", region: "East", rating: 22.24},
  {team: "No. 16 Siena", region: "East", rating: -2.1},

  {team: "No. 2 Iowa St.", region: "Midwest", rating: 32.42},
  {team: "No. 4 Alabama", region: "Midwest", rating: 25.72},
  {team: "No. 8 Georgia", region: "Midwest", rating: 20.48},
  {team: "No. 16 UMBC", region: "Midwest", rating: -1.67},

  {team: "No. 2 Houston", region: "South", rating: 33.43},
  {team: "No. 5 Vanderbilt", region: "South", rating: 27.51},
  {team: "No. 9 Iowa", region: "South", rating: 22.44},
  {team: "No. 16 Lehigh", region: "South", rating: -10.37},

  {team: "No. 2 Purdue", region: "West", rating: 31.2},
  {team: "No. 4 Arkansas", region: "West", rating: 26.05},
  {team: "No. 9 Utah St.", region: "West", rating: 20.76},
  {team: "No. 16 LIU", region: "West", rating: -3.95}
];

// Region → 1 seed
const regionNames = {
  "Midwest": "Michigan",
  "West": "Arizona",
  "East": "Duke",
  "South": "Florida"
};

// Team colors
const teamColors = {
  "Michigan": "#FFCB05",
  "Arizona": "#AB0520",
  "Florida": "#FA4616",
  "Duke": "#00539B"
};

const svg = d3.select("svg");
const tooltip = d3.select(".tooltip");

const width = +svg.attr("width");
const height = +svg.attr("height");

const margin = {top: 90, right: 160, bottom: 50, left: 140};

// Group + totals
const grouped = d3.groups(raw, d => d.region).map(([region, values]) => ({
  region,
  label: regionNames[region],
  values,
  total: d3.sum(values, d => d.rating)
}));

grouped.sort((a,b) => d3.descending(a.total, b.total));

// Scales
const x = d3.scaleLinear()
  .domain(d3.extent(raw, d => d.rating))
  .nice()
  .range([margin.left, width - margin.right]);

const y = d3.scaleBand()
  .domain(grouped.map(d => d.label))
  .range([margin.top, height - margin.bottom])
  .padding(0.65);

// Title
svg.append("text")
  .attr("class", "title")
  .attr("x", margin.left)
  .attr("y", 35)
  .text("Which No. 1 seed has the toughest road to the Final Four?");

// Subtitle
svg.append("text")
  .attr("class", "subtitle")
  .attr("x", margin.left)
  .attr("y", 58)
  .text("Opponent strength by region (KenPom rating)");

// Grid
svg.append("g")
  .attr("class", "grid")
  .attr("transform", `translate(0,${height - margin.bottom})`)
  .call(d3.axisBottom(x).ticks(6).tickSize(-height + margin.top + margin.bottom).tickFormat(""))
  .call(g => g.select(".domain").remove());

// Zero line
svg.append("line")
  .attr("x1", x(0))
  .attr("x2", x(0))
  .attr("y1", margin.top)
  .attr("y2", height - margin.bottom)
  .attr("stroke", "#999")
  .attr("stroke-dasharray", "4,2");

// Axis
svg.append("g")
  .attr("transform", `translate(0,${height - margin.bottom})`)
  .call(d3.axisBottom(x).ticks(6))
  .call(g => g.select(".domain").remove());

// Labels
svg.selectAll(".region")
  .data(grouped)
  .join("text")
  .attr("class", "region-label")
  .attr("x", margin.left - 10)
  .attr("y", d => y(d.label) + y.bandwidth()/2)
  .attr("text-anchor", "end")
  .attr("alignment-baseline", "middle")
  .text(d => d.label);

// Draw dots
svg.selectAll("g.dots")
  .data(grouped)
  .join("g")
  .attr("class", "dots")
  .selectAll("circle")
  .data(d => d.values.map(v => ({...v, label: d.label})))
  .join("circle")
    .attr("cx", d => x(d.rating))
    .attr("cy", d => y(d.label) + y.bandwidth()/2)
    .attr("r", 5.5)
    .attr("fill", d => teamColors[d.label])
    .attr("opacity", 0.9)
    .style("cursor", "pointer")

    // --- INTERACTION ---
    .on("mouseover", function(event, d) {

      // Fade others
      d3.selectAll("circle").attr("opacity", 0.2);

      // Highlight this one
      d3.select(this)
        .attr("opacity", 1)
        .attr("r", 7);

      tooltip
        .style("opacity", 1)
        .html(`${d.team}<br>${d.rating.toFixed(1)}`);
    })

    .on("mousemove", (event) => {
      tooltip
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY - 20) + "px");
    })

    .on("mouseout", function() {
      d3.selectAll("circle")
        .attr("opacity", 0.9)
        .attr("r", 5.5);

      tooltip.style("opacity", 0);
    });

// Totals
svg.selectAll(".totals")
  .data(grouped)
  .join("text")
    .attr("class", "total-label")
    .attr("x", width - margin.right + 10)
    .attr("y", d => y(d.label) + y.bandwidth()/2)
    .attr("alignment-baseline", "middle")
    .text(d => d.total.toFixed(1));

// Header
svg.append("text")
  .attr("x", width - margin.right + 10)
  .attr("y", margin.top - 20)
  .attr("font-size", 12)
  .attr("fill", "#555")
  .text("Total");

// Footer
svg.append("text")
  .attr("class", "note")
  .attr("x", margin.left)
  .attr("y", height - 10)
  .text("Source: KenPom");

</script>
</body>
</html>
